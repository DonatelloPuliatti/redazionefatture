<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Suite di Donatello Puliatti</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color: #f4f4f4;
        }

        h1 {
            margin-bottom: 40px;
            color: #333;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* spazio tra i bottoni */
        }

        .button {
            display: inline-block;
            width: 300px;
            padding: 15px;
            font-size: 18px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Benvenuto nella suite di Donatello Puliatti</h1>
    <div class="button-container">
        <a href="/somma" class="button">Somma</a>
        <a href="/moltiplicazione" class="button">Prodotto</a>
        <a href="/redazionefatture" class="button">Redazione fatture</a>
        <a href="/gestionalefatture" class="button">Gestionale fatture</a>
        <a href="/riduzioneformulelogiche" class="button">Riduzione in formule logiche</a>
        <a href="/configurazionegiuridicafattispecie" class="button">Configurazione giuridica fattispecie</a>
    </div>
</body>
</html>
