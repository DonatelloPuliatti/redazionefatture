<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Applicativo per effettuare elaborazioni statistiche sui dati ufficiali di borsaitaliana.it</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
        }

        h2 {
            text-align: center;
            color: #4CAF50;
            margin-top: 20px;
        }

        form {
            width: 1250px;
            max-width: 95%;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: #fff;
        }

        .row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        fieldset {
            flex: 1;
            min-width: 300px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            background-color: #fdfdfd;
            margin-bottom: 20px;
        }

        legend {
            font-weight: bold;
            color: #4CAF50;
            padding: 0 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.3s ease-in-out;
        }

        input[type="text"]:focus {
            border-color: #4CAF50;
            outline: none;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .radio-group label {
            display: block;
            margin-bottom: 0;
            line-height: 1.4;
        }

        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 200px;
            display: block;
            margin: 20px auto;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        .result {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            color: #4CAF50;
        }

        .fieldset-container {
            position: relative;
            display: inline-block;
        }

        #altro-container {
            display: none; /* Inizialmente nascosto */
            margin-top: 10px;
        }

        #altro-container input {
            width: 100%; /* Uniformare con gli altri input */
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.3s ease-in-out;
        }

        #altro-container input:focus {
            border-color: #4CAF50;
            outline: none;
        }

        .errore {
            color: red;
            padding: 10px;
            font-weight: bold;
            text-align: center;
            font-size: 1.2em;
            margin: 20px auto;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }


        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Stile coerente con altri input */

        .input-field {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.3s ease-in-out;
        }

        .input-field:focus {
            border-color: #4CAF50;
            outline: none;
        }

        /* Stile per la tabella dei risultati */
    .tabella-risultati {
        border-collapse: collapse;
        margin: 20px auto;
        font-size: 0.95rem;
        min-width: 95%;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .tabella-risultati thead tr {
        background-color: #4CAF50;
        color: #ffffff;
        text-align: center;
        font-weight: bold;
    }

    .tabella-risultati th, .tabella-risultati td {
        padding: 10px 12px;
        border-bottom: 1px solid #ddd;
        text-align: center;
    }

    .tabella-risultati tbody tr:nth-child(even) {
        background-color: #f9f9f9;
    }

    .tabella-risultati tbody tr:hover {
        background-color: #e8f5e9;
    }


    /* Più spazio a destra per l'icona */
    #btpTable.dataTable thead th {
        position: relative;
        padding-right: 2rem; /* aumentato */
    }

    /* Nasconde le frecce di default di DataTables */
    #btpTable.dataTable thead th.sorting:before,
    #btpTable.dataTable thead th.sorting:after,
    #btpTable.dataTable thead th.sorting_asc:before,
    #btpTable.dataTable thead th.sorting_asc:after,
    #btpTable.dataTable thead th.sorting_desc:before,
    #btpTable.dataTable thead th.sorting_desc:after {
        display: none !important;
    }

    /* Nuove frecce grandi e centrali */
    #btpTable.dataTable thead th.sorting::after {
        content: "⇅";           /* indicatore neutro */
        font-size: 18px;
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        opacity: 0.5;
        pointer-events: none;
    }

    #btpTable.dataTable thead th.sorting_asc::after {
        content: "▲";
        font-size: 20px;
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        opacity: 0.95;
        pointer-events: none;
    }

    #btpTable.dataTable thead th.sorting_desc::after {
        content: "▼";
        font-size: 20px;
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        opacity: 0.95;
        pointer-events: none;
    }





    </style>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/plug-ins/1.13.8/sorting/date-eu.js"></script>
    <script src="https://cdn.datatables.net/plug-ins/1.13.8/sorting/num-fmt.js"></script>


</head>
<body>

    <h2>Applicativo per effettuare elaborazioni statistiche sui dati ufficiali di borsaitaliana.it</h2>

        <form method="POST" id="form generale">
            <div class="row">
                <fieldset class="fieldset-container">
                    <legend>
                        Seleziona la tipologia di titoli di tuo interesse
                    </legend>
                    <div class="radio-group">
                        <label><input type="radio" name="tipologia" value="DomesticMOT" required > DomesticMOT   </label>
                        <label><input type="radio" name="tipologia" value="EuroMOT" > EuroMOT </label>
                        <label><input type="radio" name="tipologia" value="BOT" > BOT  </label>
                        <label><input type="radio" name="tipologia" value="BTP" > BTP   </label>
                        <label><input type="radio" name="tipologia" value="CTZ" > CTZ  </label>
                        <label><input type="radio" name="tipologia" value="CCT" > CCT  </label>
                    </div>
                </fieldset>
            </div>
            <div class="buttons">
                <input type="submit" name="azione" value="Procedi">
            </div>
        </form>

        {% if risultato %}
        <div class="result">{{ risultato|safe }}</div>
        {% endif %}

        {% if tabella %}
            <div style="margin:20px; overflow:auto;">
                {{ tabella|safe }}
            </div>

            <script>
                $(function () {
                    const $table = $('#btpTable');
                    if (!$table.length) return;


                    const headers = Array.from($table.find('thead th')).map(th => th.textContent.trim());

                    const idxISIN     = headers.indexOf('ISIN');
                    const idxNOME     = headers.indexOf('NOME') !== -1 ? headers.indexOf('NOME')
                         : headers.findIndex(t => t.toLowerCase().includes('nome'));
                    const idxScadenza = headers.indexOf('Scadenza') !== -1 ? headers.indexOf('Scadenza')
                         : headers.findIndex(t => t.toLowerCase().includes('scadenza'));

                    const allIdx = headers.map((_, i) => i);
                    const numericTargets = allIdx.filter(i => i !== idxISIN && i !== idxNOME && i !== idxScadenza);

                    $table.DataTable({
                        order: [],
                        pageLength: 25,
                        language: { url: "https://cdn.datatables.net/plug-ins/1.13.8/i18n/it-IT.json" },
                        columnDefs: [
                            ...(idxISIN     >= 0 ? [{ targets: idxISIN,     type: 'string'  }] : []),
                            ...(idxNOME     >= 0 ? [{ targets: idxNOME,     type: 'string'  }] : []),
                            ...(idxScadenza >= 0 ? [{ targets: idxScadenza, type: 'date-eu' }] : []),
                            ...(numericTargets.length ? [{
                                targets: numericTargets,
                                type: 'num-fmt',
                                render: function (data, type, row) {
                                    if (type === 'sort' || type === 'type') {
                                        // Se è vuoto, null o NaN, lo trattiamo come null (finisce in fondo)
                                        if (!data || data.toString().trim().toLowerCase() === 'nan') {
                                            return null;
                                        }
                                        // Sostituisci virgole con punti per il parsing numerico
                                        return parseFloat(data.toString().replace(',', '.').replace(/ /g, ''));
                                    }
                                    return data; // per display lascia invariato
                                }
                            }] : [])
                        ]

                    });
                });
            </script>




        {% endif %}

</body>
</html>
