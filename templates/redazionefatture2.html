<!DOCTYPE html>
<html>
<head>
    <title>Redazione fatture</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            color: #4CAF50;
            margin-top: 20px;
        }

        form {
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: #fff;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        input[type="submit"], .button-link {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            text-decoration: none;
            text-align: center;
            font-size: 16px;
            display: block;
            box-sizing: border-box;
        }

        input[type="submit"]:hover, .button-link:hover {
            background-color: #45a049;
        }

        .result {
            text-align: center;
            margin-top: 20px;
        }

        .home-button-container {
            width: 300px;
            margin: 20px auto;
        }
    </style>
</head>

<body>
    <h1>Compila i seguenti dati</h1>
    <form method="POST">
        <input type="text" name="nomesoggetto" placeholder="Nome e Cognome / Ragione sociale"><br><br>
        <input type="text" name="indirizzosoggetto" placeholder="Indirizzo / Sede"><br><br>
        <input type="text" name="partitaivacodicefiscale" placeholder="Partita IVA / Codice fiscale"><br><br>
        <input type="text" name="descrizioneattivita" placeholder="Descrizione attività"><br><br>
        <input type="text" name="numeronotula" placeholder="Numero della notula"><br><br>
        <input type="text" name="datanotula" placeholder="Data della notula"><br><br>
        <label>Seleziona la tipologia di dato numerico che vuoi inserire:</label><br><br>
        <div class="radio-group">
            <label><input type="radio" name="tipologiadato" value="consulenza" > Compenso con ritenuta IRPEF</label><br>
            <label><input type="radio" name="tipologiadato" value="rappresentanza"> Compenso senza ritenuta IRPEF</label><br>
            <label><input type="radio" name="tipologiadato" value="parere"> Totale con ritenuta IRPEF</label><br>
            <label><input type="radio" name="tipologiadato" value="altro"> Totale senza ritenuta IRPEF</label>
        </div>
        <br><br>
        <input type="text" name="datoeconomico" placeholder="Inserisci il dato numerico (per i decimali usa il punto)"><br><br>
        <input type="submit" value="Esponi gli elementi economici della fattura">
        <input type="submit" value="Genera il file .docx della notula">
        <input type="submit" value="Genera il file .pdf della notula">
    </form>

    {% if risultato is not none %}
        <div class="result">
            <h3>Risultato: {{ risultato }}</h3>
        </div>
    {% endif %}

    <div class="home-button-container">
        <a href="/" class="button-link">Torna alla Home</a>
    </div>
</body>
</html>
